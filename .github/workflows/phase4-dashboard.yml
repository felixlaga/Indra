name: Phase 4 dashboard

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "src/api/**"
      - "test_api.py"
      - "test_api_cors.py"
      - "vercel.json"
      - ".github/workflows/phase4-dashboard.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "src/api/**"
      - "test_api.py"
      - "test_api_cors.py"
      - "vercel.json"
      - ".github/workflows/phase4-dashboard.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  api-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API test dependencies
        run: python -m pip install fastapi httpx pydantic pytest pytest-asyncio python-dotenv pyyaml
      - name: Run API tests for diagnostics
        continue-on-error: true
        run: pytest -vv test_api_cors.py test_api.py 2>&1 | tee pytest-output.txt
      - name: Upload API test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-output
          path: pytest-output.txt
